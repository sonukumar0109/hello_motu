<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khana khaoge ?</title>
    <link rel="stylesheet" href="css/food.css" />
  </head>
  <body>
    <div id="foodquestion">
      <b>Hainnnnnnn!!!!! Kuch khaoge ?</b>
    </div>

    <div class="food-selection">
      <div class="food-item">
        <img src="food/burgers.jpeg" alt="Burgers" />
        <label
          ><input
            type="checkbox"
            name="food"
            value="Burgers"
          />
          Burgers khaoge </label
        >
      </div>
      <div class="food-item">
        <img src="food/dog.jpeg" alt="dog" />
        <label
          ><input type="checkbox" name="food" value="hotdog" /> Hotdog khaoge</label
        >
      </div>
      <div class="food-item">
        <img src="food/momo.jpeg" alt="momo" />
        <label
          ><input type="checkbox" name="food" value="Momo" /> Momo khaoge</label
        >
      </div>
      <div class="food-item">
        <img src="food/pasta.jpeg" alt="pasta" />
        <label><input type="checkbox" name="food" value="pasta" /> Pasta khaoge</label>
      </div>
      <div class="food-item">
        <img src="food/pizza.jpeg" alt="pizza" />
        <label><input type="checkbox" name="food" value="pizza" /> Pizza khaoge</label>
      </div>
      <div class="food-item">
        <img src="food/salad.jpeg" alt="salad" />
        <label><input type="checkbox" name="food" value="salad" /> Salad khaoge</label>
      </div>
      <div class="food-item">
        <img src="food/chilli.jpeg" alt="steak" />
        <label><input type="checkbox" name="food" value="chilli" /> Chilli khaoge</label>
      </div>
      <div class="food-item">
        <img src="food/sushi.jpeg" alt="sushi" />
        <label><input type="checkbox" name="food" value="sushi" /> Sushi khaoge </label>
      </div>
    </div>
    <button class="button" onclick="location.href='dessert.html'">
      Ni Khana kuch or dekhe ;-) ...
    </button>
  </body>
</html>
